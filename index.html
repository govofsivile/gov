<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Government of Sivile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: "Georgia", serif;
            margin: 0;
            background-color: #f4f6f8;
            color: #1a1a1a;
        }

        header {
            background-color: #0f1f3d;
            color: white;
            padding: 20px;
            text-align: center;
        }

        header img {
            max-width: 150px;
            display: block;
            margin: 0 auto 10px auto;
        }

        .meta {
            margin-top: 10px;
            font-size: 0.95em;
        }

        .buttons {
            margin-top: 15px;
        }

        .buttons a {
            text-decoration: none;
            padding: 10px 18px;
            margin: 5px;
            background-color: #ffffff;
            color: #0f1f3d;
            border-radius: 5px;
            font-weight: bold;
            border: 2px solid #ffffff;
            transition: 0.2s ease;
        }

        .buttons a:hover {
            background-color: #d9e1f2;
        }

        main {
            padding: 30px;
            max-width: 900px;
            margin: auto;
        }

        h2 {
            border-bottom: 2px solid #0f1f3d;
            padding-bottom: 5px;
            margin-top: 40px;
        }

        .form-section {
            background-color: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        .form-section label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }

        .form-section input,
        .form-section select {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        .form-section button {
            margin-top: 15px;
            padding: 10px 15px;
            background-color: #0f1f3d;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .form-section button:hover {
            background-color: #162b55;
        }

        .role {
            background-color: white;
            padding: 15px;
            margin-top: 15px;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .portrait {
            width: 100px;
            height: 120px;
            object-fit: cover;
            border-radius: 6px;
            border: 2px solid #0f1f3d;
        }

        .role-content {
            flex: 1;
        }

        .role p {
            margin: 4px 0;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #0f1f3d;
            color: white;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<header>
    <img src="sivile.png" alt="Flag of Sivile">
    <h1>Government of Sivile</h1>

    <div class="meta">
        <p><strong>Most Recent Constitutional Amendment:</strong> N/A</p>
        <p><strong>Constitution Ratified:</strong> N/A</p>
    </div>

    <div class="buttons">
        <a href="https://www.instagram.com/govofsivile/" target="_blank">Official Instagram</a>
        <a href="https://github.com/govofsivile/sivile-constitution/blob/main/const.pdf" target="_blank">View Constitution</a>
    </div>
</header>

<main>

<h2>Citizenship Application</h2>

<div class="form-section">
    <form>
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" name="firstName" required>

        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" name="lastName" required>

        <label for="gender">Gender Marker</label>
        <select id="gender" name="gender" required>
            <option value="">Select</option>
            <option value="F">F</option>
            <option value="M">M</option>
            <option value="X">X</option>
        </select>

        <label for="residence">Residence Location</label>
        <input type="text" id="residence" name="residence" placeholder="City, State/Province, Country" required>

        <button type="submit">Submit Application</button>
    </form>
</div>

<!-- The remainder of your government structure remains unchanged below -->

</main>

<footer>
    © Government of Sivile
</footer>

<script>
document.querySelectorAll('.role').forEach(role => {
    const img = role.querySelector('.portrait');
    const file = role.getAttribute('data-img') || 'placeholder.png';
    img.src = file;
    img.onerror = function() {
        this.onerror = null;
        this.src = 'placeholder.png';
    };
});
</script>

</body>
</html>
